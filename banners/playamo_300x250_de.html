<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:300px;height:250px;overflow:hidden;cursor:pointer;font-family:'Arial Black',Arial,sans-serif;background:#0a0a0a;}
@keyframes shimmer{0%{background-position:-300px 0}100%{background-position:300px 0}}
@keyframes glow{0%,100%{box-shadow:0 0 15px rgba(255,210,52,0.4)}50%{box-shadow:0 0 40px rgba(255,210,52,0.9)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.wrap{
  width:300px;height:250px;position:relative;overflow:hidden;
  background:linear-gradient(160deg,#0d0d1a 0%,#1a0a00 60%,#0d0d0d 100%);
}
.bg-glow{
  position:absolute;top:-30px;left:50%;transform:translateX(-50%);
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,160,0,0.18),transparent 70%);
  pointer-events:none;
}
.top-bar{
  position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#ffd234,#ff9f00,#ffd234);
  background-size:200% auto;animation:shimmer 2s linear infinite;
}
.casino-name{
  position:absolute;top:14px;left:0;right:0;
  text-align:center;font-size:11px;font-weight:900;
  letter-spacing:3px;color:rgba(255,255,255,0.35);
  text-transform:uppercase;
}
.bonus-wrap{
  position:absolute;top:32px;left:0;right:0;text-align:center;
  animation:fadeIn 0.5s ease both;
}
.bonus-pre{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.3);font-weight:700;text-transform:uppercase;margin-bottom:2px;}
.bonus-amt{
  font-size:58px;font-weight:900;line-height:0.9;letter-spacing:-3px;
  background:linear-gradient(180deg,#fffbe0,#ffd234 40%,#ff9f00 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 12px rgba(255,160,0,0.5));
}
.bonus-lbl{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.35);font-weight:700;margin-top:1px;}

.plus{font-size:18px;font-weight:900;color:rgba(255,210,52,0.3);margin:3px 0;text-align:center;}

.fs-row{display:flex;align-items:center;justify-content:center;gap:6px;}
.fs-num{font-size:42px;font-weight:900;color:#fff;line-height:1;filter:drop-shadow(0 0 10px rgba(255,255,255,0.15));}
.fs-lbl{font-size:11px;font-weight:900;letter-spacing:2px;color:#ffd234;line-height:1.2;text-align:left;}

.cta{
  position:absolute;bottom:14px;left:14px;right:14px;
  background:linear-gradient(135deg,#ffd234,#ff9f00);
  border-radius:8px;padding:10px;text-align:center;
  animation:glow 2s ease-in-out infinite,pulse 2s ease-in-out infinite;
  font-size:12px;font-weight:900;color:#000;letter-spacing:1px;
  text-transform:uppercase;overflow:hidden;position:absolute;
}
.cta::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
  animation:shimmer 1.8s linear infinite;
}
.live-dot{
  position:absolute;bottom:52px;right:16px;
  display:flex;align-items:center;gap:4px;
  font-size:8px;color:rgba(255,255,255,0.3);font-weight:700;
}
.dot{width:5px;height:5px;border-radius:50%;background:#00e676;box-shadow:0 0 5px #00e676;animation:blink 1s infinite;}
.bottom-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ffd234,#ff9f00,#ffd234);background-size:200% auto;animation:shimmer 2s linear infinite;}
</style>
</head>
<body>
<a href="https://bonusfacts.com/lp.html?aclid={aclid}&sub1={spot_id}&sub2={campaign_id}&utm_source=tj_banner_de" target="_blank" style="text-decoration:none;display:block;">
<div class="wrap">
  <div class="bg-glow"></div>
  <div class="top-bar"></div>
  <div class="casino-name">PlayAmo Casino</div>
  <div class="bonus-wrap">
    <div class="bonus-pre">Willkommensbonus</div>
    <div class="bonus-amt">3.500€</div>
    <div class="bonus-lbl">Bonus-Paket</div>
  </div>
  <div class="plus">+</div>
  <div class="fs-row">
    <div class="fs-num">150</div>
    <div class="fs-lbl">FREI-<br>SPIELE</div>
  </div>
  <div class="live-dot"><div class="dot"></div>Jetzt verfügbar</div>
  <div class="cta">🎰 Bonus jetzt sichern →</div>
  <div class="bottom-bar"></div>
</div>
</a>
</body>
</html>
